<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget — Family Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/admin.css">
  <style>
    .budget-total-card {
      background: var(--color-interaction);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .budget-total-label { font-size: 13px; font-weight: 600; opacity: .8; text-transform: uppercase; letter-spacing: .06em; }
    .budget-total-value { font-size: 36px; font-weight: 700; margin-top: 4px; }
    .budget-total-sub { font-size: 13px; opacity: .7; margin-top: 2px; }
    .breakdown-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .breakdown-table th { text-align: left; padding: 10px 14px; background: var(--color-bg-subtle); font-size: 12px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--color-border); }
    .breakdown-table td { padding: 10px 14px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table .cat-name { font-weight: 600; color: var(--color-text-primary); text-transform: capitalize; }
    .editable-cell { cursor: pointer; color: var(--color-text-primary); }
    .editable-cell:hover { background: var(--color-bg-subtle); border-radius: 4px; }
    .editable-cell input { width: 100%; border: 1px solid var(--color-interaction); border-radius: 4px; padding: 4px 8px; font-size: 14px; outline: none; }
    .remaining-positive { color: var(--color-success); font-weight: 600; }
    .remaining-negative { color: var(--color-danger); font-weight: 600; }
    .summary-row td { background: var(--color-bg-subtle); font-weight: 600; border-top: 2px solid var(--color-border); }
    .progress-section { margin-top: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
    .progress-bar-track { height: 12px; background: var(--color-bg-subtle); border-radius: 6px; overflow: hidden; border: 1px solid var(--color-border); }
    .progress-bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease, background .4s ease; }
    .no-trip-banner { background: var(--color-interaction-light); border: 1px solid var(--color-interaction-border); border-radius: var(--radius-lg); padding: 16px 20px; color: var(--color-interaction); font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <a class="sidebar-brand" href="index.html">
      <img src="elephant.svg" alt="">
      <span class="sidebar-brand-name">Trip Planner</span>
    </a>
    <nav class="sidebar-nav">
      <span class="sidebar-section-label">Navigation</span>
      <a class="sidebar-link" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Trips
      </a>
      <a class="sidebar-link" href="itinerary.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Itinerary
      </a>
      <a class="sidebar-link active" href="budget.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Budget
      </a>
      <a class="sidebar-link" href="destinations.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        Destinations
      </a>
      <a class="sidebar-link" href="checklist.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Checklist
      </a>
      <a class="sidebar-link" href="discussions.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Discussion Log
      </a>
    </nav>
    <div class="sidebar-footer">Family Trip Planner v2</div>
  </aside>

  <main class="admin-main">
    <header class="page-header">
      <h1 class="page-header-title">Budget Breakdown</h1>
      <div class="page-header-actions">
        <select class="form-select" id="tripSelect" style="width:220px" onchange="onTripChange(this.value)">
          <option value="">Select a trip…</option>
        </select>
        <button class="btn btn-secondary" id="genBudgetBtn" onclick="generateBudgetEstimate()" style="display:none">✦ Generate Budget Estimate</button>
      </div>
    </header>
    <div class="admin-content">

      <div id="noTripBanner" class="no-trip-banner" style="display:none">
        Please select a trip above to view its budget.
      </div>

      <div id="budgetContent" style="display:none">

        <div class="budget-total-card">
          <div>
            <div class="budget-total-label">Total Budget</div>
            <div class="budget-total-value" id="totalBudgetValue">—</div>
            <div class="budget-total-sub" id="totalBudgetSub"></div>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" width="64" height="64"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        </div>

        <div class="table-panel">
          <table class="breakdown-table">
            <thead>
              <tr>
                <th>Category</th>
                <th>Estimated</th>
                <th>Actual</th>
                <th>Remaining</th>
              </tr>
            </thead>
            <tbody id="breakdownBody"></tbody>
            <tfoot id="breakdownFoot"></tfoot>
          </table>
        </div>

        <div class="progress-section">
          <div class="progress-label">
            <span>Spending Progress (Actual vs Total Budget)</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/budget.js"></script>
</body>
</html>
